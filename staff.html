<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>勇吉屋 店舗側ポイント処理デモ</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js?v=20260613-point-sync"></script>
  </head>
  <body>
    <main class="staff-page-shell" aria-label="勇吉屋 店舗側ポイント処理">
      <header class="staff-page-header">
        <div>
          <p>QR読み取り後の店舗側画面</p>
          <h1>ポイント処理</h1>
        </div>
        <a class="staff-page-link" href="./?screen=points">顧客画面</a>
      </header>

      <section class="staff-dashboard-card" aria-label="会員情報">
        <div class="staff-member-summary">
          <div>
            <p>読み取り会員</p>
            <h2 id="staffMemberName">山田 由美 様</h2>
          </div>
          <span class="staff-member-code" id="staffMemberCode">YK-001234</span>
        </div>

        <div class="staff-balance-box">
          <span class="staff-balance-label">現在ポイント</span>
          <strong id="staffCurrentPoints">1,250pt</strong>
        </div>
      </section>

      <section class="staff-dashboard-card" aria-label="ポイント増減">
        <div class="section-title-row">
          <h2>増減入力</h2>
        </div>

        <div class="staff-quick-actions" aria-label="よく使う増減">
          <button class="staff-delta-button is-plus is-active" type="button" data-delta="100">+100</button>
          <button class="staff-delta-button is-plus" type="button" data-delta="300">+300</button>
          <button class="staff-delta-button is-minus" type="button" data-delta="-50">-50</button>
        </div>

        <div class="staff-form-grid">
          <label>
            <span>増減ポイント</span>
            <input id="staffDeltaInput" type="number" inputmode="numeric" value="100" />
          </label>
          <label>
            <span>理由</span>
            <select id="staffReasonInput">
              <option value="学生服購入">学生服購入</option>
              <option value="紙カードから移行">紙カードから移行</option>
              <option value="補正サービス利用">補正サービス利用</option>
              <option value="ポイント訂正">ポイント訂正</option>
            </select>
          </label>
        </div>

        <label class="staff-memo-label">
          <span>メモ</span>
          <textarea id="staffMemoInput" rows="3" placeholder="レシート番号、紙カード移行内容など"></textarea>
        </label>

        <button class="apply-points-button" id="applyPointsButton" type="button">
          顧客ポイントへ反映
        </button>

        <div class="staff-result" id="staffResult" hidden>反映しました</div>
      </section>

      <section class="staff-dashboard-card" aria-label="直近履歴">
        <div class="section-title-row">
          <h2>直近履歴</h2>
          <span id="staffSyncText">待機中</span>
        </div>
        <div class="staff-transaction-list" id="staffTransactionList"></div>
      </section>
    </main>

    <script src="./staff.js?v=20260613-point-sync"></script>
  </body>
</html>

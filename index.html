<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>勇吉屋 公式LINE会員情報デモ</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="勇吉屋公式LINE 会員情報デモ">
      <header class="line-header">
        <a class="back-link" href="https://lin.ee/7byeeeA" target="_blank" rel="noreferrer" aria-label="勇吉屋公式LINEを開く">
          <span aria-hidden="true">‹</span>
        </a>
        <div>
          <p class="header-kicker" id="liffStatus">勇吉屋 公式LINE</p>
          <h1>会員情報</h1>
        </div>
        <button class="header-icon" type="button" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
      </header>

      <section class="hero-card">
        <div class="qr-card">
          <div class="qr-copy">
            <p class="eyebrow">会員情報QR</p>
            <h2>店頭ではこのQRを提示</h2>
            <p>ポイント付与・紙カード移管・採寸相談に使えます。</p>
          </div>
          <canvas id="qrCanvas" width="176" height="176" aria-label="デモ用会員QR"></canvas>
        </div>

        <div class="member-summary" id="memberSummary"></div>
      </section>

      <section class="mode-panel" aria-label="代表者パターン">
        <p class="section-label">代表者の考え方</p>
        <div class="segmented">
          <button class="mode-button is-active" data-mode="guardian" type="button">親御さん</button>
          <button class="mode-button" data-mode="student" type="button">生徒本人</button>
          <button class="mode-button" data-mode="family" type="button">ご家族</button>
        </div>
        <p class="hint">親御さんがいない場合も、長男・長女など本人を代表者にできます。</p>
      </section>

      <section class="family-section" aria-label="家族とお子さま情報">
        <div class="section-title-row">
          <div>
            <p class="section-label">家族・お子さま情報</p>
            <h2>誕生日から年齢と学年を自動表示</h2>
          </div>
          <button class="mini-button" id="addMemberButton" type="button">追加</button>
        </div>
        <div class="member-list" id="memberList"></div>
      </section>

      <section class="edit-panel" aria-label="会員情報編集">
        <div class="section-title-row">
          <div>
            <p class="section-label">選択中の情報</p>
            <h2>デモ入力</h2>
          </div>
          <span class="save-pill">自動保存風</span>
        </div>

        <div class="editor-grid">
          <label>
            <span>表示名</span>
            <input id="nameInput" type="text" autocomplete="name" />
          </label>
          <label>
            <span>生年月日</span>
            <input id="birthdayInput" type="date" />
          </label>
          <label>
            <span>区分</span>
            <select id="roleInput">
              <option value="代表者">代表者</option>
              <option value="親御さん">親御さん</option>
              <option value="生徒">生徒</option>
              <option value="その他ご家族">その他ご家族</option>
            </select>
          </label>
          <label>
            <span>学校名</span>
            <input id="schoolInput" type="text" />
          </label>
        </div>

        <div class="notice-box">
          <strong>生年月日の利用目的</strong>
          <span>年齢・学年の自動表示と、学校用品のご案内に使用します。学年は本番では手動修正も可能にします。</span>
        </div>
      </section>

      <section class="avatar-panel" aria-label="アイコン選択">
        <div class="section-title-row">
          <div>
            <p class="section-label">アイコン</p>
            <h2>写真または選べるアイコン</h2>
          </div>
          <label class="photo-button">
            写真を選ぶ
            <input id="photoInput" type="file" accept="image/*" />
          </label>
        </div>
        <div class="avatar-grid" id="avatarGrid"></div>
      </section>

      <section class="visual-menu" aria-label="会員情報から使えるメニュー">
        <a class="menu-tile green" href="#memberList">
          <span class="tile-icon member-icon" aria-hidden="true"></span>
          <strong>会員情報</strong>
          <small>家族情報を確認</small>
        </a>
        <a class="menu-tile yellow" href="#qrCanvas">
          <span class="tile-icon point-icon" aria-hidden="true">P</span>
          <strong>ポイント</strong>
          <small>QRと履歴へ</small>
        </a>
        <a class="menu-tile blue" href="#birthdayInput">
          <span class="tile-icon calendar-icon" aria-hidden="true"></span>
          <strong>採寸予約</strong>
          <small>予約サイトへ</small>
        </a>
        <a class="menu-tile teal" href="#memberSummary">
          <span class="tile-icon measure-icon" aria-hidden="true"></span>
          <strong>採寸記録</strong>
          <small>前回採寸を確認</small>
        </a>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

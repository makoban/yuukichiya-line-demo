<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>勇吉屋 公式LINE会員情報デモ</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="勇吉屋公式LINE 会員情報デモ">
      <header class="line-header">
        <a class="back-link" href="https://lin.ee/7byeeeA" target="_blank" rel="noreferrer" aria-label="勇吉屋公式LINEを開く">
          <span aria-hidden="true">‹</span>
        </a>
        <div>
          <p class="header-kicker" id="liffStatus">勇吉屋 公式LINE</p>
          <h1>会員情報</h1>
        </div>
      </header>

      <section class="hero-card">
        <div class="qr-card">
          <div class="qr-copy">
            <p class="eyebrow">代表者アイコン</p>
            <h2>一番上の人が代表者</h2>
            <p>アイコンをタップすると変更できます。</p>
          </div>
          <button class="qr-avatar-button" id="avatarOpenButton" type="button" aria-label="代表者アイコンを変更">
            <img id="representativeAvatar" src="./assets/avatars/avatar-04-guardian.png" alt="代表者アイコン" />
            <span>変更</span>
          </button>
        </div>

        <div class="member-summary" id="memberSummary"></div>
      </section>

      <section class="family-section" aria-label="家族とお子さま情報">
        <div class="section-title-row">
          <div>
            <p class="section-label">家族・お子さま情報</p>
            <h2>誕生日から年齢と学年を自動表示</h2>
          </div>
          <button class="mini-button" id="addMemberButton" type="button">追加</button>
        </div>
        <div class="member-list" id="memberList"></div>
      </section>

      <section class="edit-panel" aria-label="会員情報編集">
        <div class="section-title-row">
          <div>
            <p class="section-label">選択中の情報</p>
            <h2>デモ入力</h2>
          </div>
          <span class="save-pill">自動保存風</span>
        </div>

        <div class="editor-grid">
          <label>
            <span>表示名</span>
            <input id="nameInput" type="text" autocomplete="name" />
          </label>
          <label>
            <span>生年月日</span>
            <input id="birthdayInput" type="date" />
          </label>
          <label>
            <span>区分</span>
            <select id="roleInput">
              <option value="代表者">代表者</option>
              <option value="親御さん">親御さん</option>
              <option value="生徒">生徒</option>
              <option value="その他ご家族">その他ご家族</option>
            </select>
          </label>
          <label>
            <span>学校名</span>
            <input id="schoolInput" type="text" />
          </label>
        </div>

        <div class="notice-box">
          <strong>生年月日の利用目的</strong>
          <span>年齢・学年の自動表示と、学校用品のご案内に使用します。学年は本番では手動修正も可能にします。</span>
        </div>
      </section>

      <section class="avatar-sheet" id="avatarSheet" aria-label="アイコン変更" hidden>
        <div class="avatar-sheet-panel">
          <div class="section-title-row">
            <div>
              <p class="section-label">代表者アイコン</p>
              <h2>アイコンを選択</h2>
            </div>
            <button class="sheet-close" id="avatarCloseButton" type="button">閉じる</button>
          </div>
          <div class="avatar-actions">
            <label class="photo-button">
              写真を選ぶ
              <input id="photoInput" type="file" accept="image/*" />
            </label>
          </div>
          <div class="avatar-grid" id="avatarGrid"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>勇吉屋 公式LINE会員情報デモ</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="勇吉屋公式LINE 会員情報">
      <header class="line-header">
        <a class="back-link" href="https://lin.ee/7byeeeA" target="_blank" rel="noreferrer" aria-label="勇吉屋公式LINEを開く">
          <span aria-hidden="true">‹</span>
        </a>
        <div>
          <p class="header-kicker" id="liffStatus">勇吉屋 公式LINE</p>
          <h1>会員情報</h1>
        </div>
      </header>

      <section class="representative-card" aria-label="代表者枠">
        <div class="representative-head">
          <span class="representative-badge">代表者</span>
          <strong id="representativeName">山田 由美 様</strong>
        </div>

        <div class="representative-main">
          <button class="avatar-button" id="avatarOpenButton" type="button" aria-label="アイコンを変更">
            <img id="representativeAvatar" src="./assets/avatars/avatar-04-guardian.png" alt="アイコン" />
            <span>変更</span>
          </button>

          <div class="qr-panel" aria-label="会員QR">
            <canvas id="qrCanvas" width="176" height="176"></canvas>
            <span>QR</span>
          </div>
        </div>

        <dl class="representative-details">
          <div>
            <dt>会員番号</dt>
            <dd id="memberNumberText">YK-001234</dd>
          </div>
          <div>
            <dt>生年月日</dt>
            <dd id="representativeBirthday">1985年6月11日</dd>
          </div>
        </dl>
      </section>

      <section class="member-section" aria-label="登録メンバー">
        <div class="section-title-row">
          <h2>登録メンバー</h2>
          <button class="mini-button" id="addMemberButton" type="button">追加</button>
        </div>
        <div class="member-list" id="memberList"></div>
      </section>

      <section class="edit-panel" aria-label="登録情報">
        <div class="section-title-row">
          <h2>登録情報</h2>
        </div>

        <div class="editor-grid">
          <label>
            <span>表示名</span>
            <input id="nameInput" type="text" autocomplete="name" />
          </label>
          <label>
            <span>生年月日</span>
            <input id="birthdayInput" type="date" />
          </label>
          <label>
            <span>区分</span>
            <select id="roleInput">
              <option value="代表者">代表者</option>
              <option value="親御さん">親御さん</option>
              <option value="生徒">生徒</option>
              <option value="その他ご家族">その他ご家族</option>
            </select>
          </label>
          <label>
            <span>学校名</span>
            <input id="schoolInput" type="text" />
          </label>
        </div>
      </section>

      <section class="avatar-sheet" id="avatarSheet" aria-label="アイコン変更" hidden>
        <div class="avatar-sheet-panel">
          <div class="section-title-row">
            <h2>アイコン変更</h2>
            <button class="sheet-close" id="avatarCloseButton" type="button">閉じる</button>
          </div>
          <div class="avatar-actions">
            <label class="photo-button">
              写真を選ぶ
              <input id="photoInput" type="file" accept="image/*" />
            </label>
          </div>
          <div class="avatar-grid" id="avatarGrid"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
